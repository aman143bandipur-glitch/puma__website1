<!DOCTYPE html>
<html>
<head>
<title>Puma Store</title>
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
}
header{
background:black;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}
.logo{
font-size:28px;
font-weight:bold;
}
nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-size:16px;
}
.hero{
height:400px;
background:url("https://images.unsplash.com/photo-1542291026-7eec264c27ff");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}
.hero h1{
font-size:50px;
background:rgba(0,0,0,0.6);
padding:20px;
}
.products{
padding:40px;
text-align:center;
}
.products h2{
margin-bottom:30px;
}
.grid{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}
.card{
background:white;
width:220px;
padding:15px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
transition:0.3s;
}
.card:hover{
transform:scale(1.05);
}
.card img{
width:100%;
border-radius:10px;
}
button{
background:black;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
cursor:pointer;
}
footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>
<body>
<header>
<div class="logo">PUMA</div>
<nav>
<a href="#">Home</a>
<a href="#">Shoes</a>
<a href="#">Clothing</a>
<a href="#">Contact</a>
</nav>
</header>
<div class="hero">
<h1>FOREVER FASTER</h1>
</div>
<section class="products">
<h2>Popular Products</h2>
<div class="grid">
<div class="card">
<img src="https://images.unsplash.com/photo-1528701800489-20be3c3c37d3">
<h3>Puma Hoodie</h3>
<p>$80</p>
<button>Buy Now</button>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<h3>Puma T-Shirt</h3>
<p>$40</p>
<button>Buy Now</button>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Puma Shoes</h3>
<p>$120</p>
<button>Buy Now</button>
</div>
</div>
</section>
<footer>
© 2026 Puma Demo Website
</footer>

</body>
</html>
